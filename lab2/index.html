<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Number – with style</title>

<style>

/* ===== BACKGROUND IMAGE + FALLBACK ===== */
body{
    font-family: 'Arial', sans-serif;
    /* custom background image (abstract neon shapes) + solid color overlay technique */
    background: url('https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    position: relative;
}

/* semi‑transparent layer to keep text readable (acts as solid background behind container) */
body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0, 20, 30, 0.5);  /* dark blue overlay to dim bg */
    z-index: 0;
}

/* ===== Game Container – now with solid background + shadow ===== */
.container{
    background: #fefefe;        /* solid off‑white */
    padding: 30px 25px;
    border-radius: 24px;
    width: 420px;
    text-align:center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(255,215,0,0.3) inset;
    position: relative;
    z-index: 2;                 /* above overlay */
    backdrop-filter: blur(2px);  /* subtle glass to blend with background, but still solid bg */
    border: 1px solid rgba(255,255,240,0.7);
}

/* ===== Title ===== */
h1{
    margin-bottom:10px;
    color:#0b2b40;
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 #e0f2fe;
}

/* ===== Input Field ===== */
input{
    padding:12px 15px;
    width:140px;
    border: 2px solid #b0c4de;
    border-radius:40px;
    font-size:18px;
    text-align:center;
    background: #fffff0;
    font-weight:bold;
    transition: 0.2s;
}
input:focus{
    border-color: #ff8c42;
    outline:none;
    background:#fffae7;
}

/* ===== Buttons with modern touch ===== */
button{
    padding:12px 25px;
    margin:12px 6px 6px 6px;
    border:none;
    border-radius:60px;
    cursor:pointer;
    font-size:17px;
    font-weight:600;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 6px 0 #b38b5f, 0 8px 12px rgba(0,0,0,0.2);
}
button:active{
    transform: translateY(6px);
    box-shadow: 0 2px 0 #b38b5f, 0 5px 10px rgba(0,0,0,0.1);
}

#guessBtn{
    background:#f4a261;
    color:#1e2f47;
    border: 1px solid #ffe3c0;
}
#guessBtn:hover:enabled{
    background:#e76f51;
    color:white;
}
#guessBtn:disabled{
    opacity:0.5;
    transform: none;
    box-shadow: 0 3px 0 #7f5539;
    cursor: not-allowed;
}

#resetBtn{
    background:#3b9eff;
    color:white;
    display:none;
    border: 1px solid #b0e0ff;
}
#resetBtn:hover{
    background:#1f7ad1;
}

/* ===== Messages area with solid bg inside container ===== */
#message{
    margin-top:20px;
    font-weight:bold;
    font-size:1.1rem;
    background: #1e2f47;        /* dark solid background for text contrast */
    color: #f8f0e3;
    padding: 12px 8px;
    border-radius: 50px;
    border-left: 6px solid #f4a261;
}

/* ===== Error message uses same background but red accent ===== */
.error{
    color: #ffb4a2;            /* light salmon on dark bg */
    font-weight: bold;
}

/* ===== Guess history with solid bg ===== */
#guesses{
    margin-top:20px;
    padding:15px 12px;
    border:2px dashed #5f6c7a;
    min-height:50px;
    border-radius: 40px;
    background: #2e3b4e;        /* solid dark background */
    color: #f2e9d0;
    font-size:1.1rem;
    word-break: break-word;
    box-shadow: inset 0 2px 5px #0f1a24;
}
#guesses b{
    color: #ffcf9a;
}

/* ===== Scoreboard with solid background for readability ===== */
.score{
    margin-top:25px;
    display:flex;
    justify-content:space-around;
    font-weight:bold;
    background: #283845;         /* solid dark blue-grey */
    padding: 12px 5px;
    border-radius: 60px;
    color: #f7e7cc;
    border: 1px solid #f4a261;
    font-size: 1.2rem;
}
.score div {
    background: #1d2b39;         /* even darker solid panes */
    padding: 6px 18px;
    border-radius: 30px;
    box-shadow: inset 0 1px 3px black;
}

/* attempts left indicator – extra feature */
#attemptsLeft {
    background: #2b3d54;
    color: #fedaab;
    padding: 8px 15px;
    border-radius: 30px;
    display: inline-block;
    margin-top: 5px;
    font-weight: bold;
    border: 1px solid gold;
}
</style>
</head>
<body>

<div class="container">

<h1>🔢 NUMBER GUESSER</h1>

<p style="background:#e9d8a6; padding:6px; border-radius:30px; color:#1e415e; font-weight:bold;">Guess a number between <b>1 and 99</b></p>

<!-- attempts left display added right above input -->
<div id="attemptsLeft">✨ Attempts left: 7</div>

<input type="number" id="guessInput" placeholder="Enter guess" min="1" max="99">

<br>

<button id="guessBtn">Guess</button>
<button id="resetBtn">Play Again</button>

<div id="message">💡 Start by guessing a number</div>

<div id="guesses">
<b>📋 Guesses:</b> <span id="guessList"></span>
</div>

<!-- scoreboard shows wins / losses (global) -->
<div class="score">
<div>🏆 Wins: <span id="wins">0</span></div>
<div>📉 Losses: <span id="losses">0</span></div>
</div>

</div>

<script>

/* ===== Global variables for wins/losses ===== */
let targetNumber = Math.floor(Math.random() * 99) + 1;
let attempts = 0;
const MAX_ATTEMPTS = 7;

// these two track totals across games (global)
let totalWins = 0;
let totalLosses = 0;

/* ===== DOM elements ===== */
const guessInput = document.getElementById("guessInput");
const guessBtn = document.getElementById("guessBtn");
const resetBtn = document.getElementById("resetBtn");
const message = document.getElementById("message");
const guessList = document.getElementById("guessList");
const winsDisplay = document.getElementById("wins");
const lossesDisplay = document.getElementById("losses");
const attemptsLeftSpan = document.getElementById("attemptsLeft");   // new display

/* ===== helper to update attempts left UI ===== */
function updateAttemptsLeft() {
    let left = MAX_ATTEMPTS - attempts;
    if (left < 0) left = 0;
    attemptsLeftSpan.innerHTML = `✨ Attempts left: ${left}`;
}

/* ===== initial display ===== */
updateAttemptsLeft();

/* ===== Guess Button Event ===== */
guessBtn.addEventListener("click", function() {

    let guess = Number(guessInput.value);

    // ----- Input validation -----
    if (!Number.isInteger(guess) || guess < 1 || guess > 99) {
        message.innerHTML = "❌ Please enter a whole number between 1 and 99.";
        message.classList.add("error");
        return;
    }

    message.classList.remove("error");

    // ----- Increase attempts -----
    attempts++;
    updateAttemptsLeft();        // <-- display updated attempts left

    // ----- Display guess history (with separator) -----
    if (guessList.innerHTML === "") {
        guessList.innerHTML = guess;
    } else {
        guessList.innerHTML += " · " + guess;
    }

    // ----- Win condition -----
    if (guess === targetNumber) {
        message.innerHTML = "🎉✨ Congratulations! You guessed the number in " + attempts + " attempts!";
        totalWins++;                    // increment global wins
        winsDisplay.innerHTML = totalWins;
        endGame();
    }
    // ----- Loss condition (out of attempts) -----
    else if (attempts >= MAX_ATTEMPTS) {
        message.innerHTML = "<span class='error'>😵 You lost! The number was " + targetNumber + "</span>";
        totalLosses++;                   // increment global losses
        lossesDisplay.innerHTML = totalLosses;
        endGame();
    }
    // ----- Hints -----
    else if (guess < targetNumber) {
        message.innerHTML = "⬆️ Too low! Try a higher number.";
    } else {
        message.innerHTML = "⬇️ Too high! Try a lower number.";
    }

    guessInput.value = "";
    guessInput.focus();
});

/* ===== End Game (disable input, show reset, and also grey out attempts left) ===== */
function endGame() {
    guessBtn.disabled = true;
    resetBtn.style.display = "inline-block";
    guessInput.disabled = true;          // also disable input for clarity
    // we don't further update attempts left, but it stays at 0 if lost
}

/* ===== Reset Button – restarts game, keeps global wins/losses ===== */
resetBtn.addEventListener("click", function() {

    // new secret number
    targetNumber = Math.floor(Math.random() * 99) + 1;
    attempts = 0;

    // update attempts left display
    updateAttemptsLeft();

    // clear guess history & message
    guessList.innerHTML = "";
    message.innerHTML = "🔄 New round! Start guessing.";

    // enable controls
    guessBtn.disabled = false;
    guessInput.disabled = false;
    resetBtn.style.display = "none";

    // remove any error class
    message.classList.remove("error");

    // keep wins & losses displayed (already persisted)
    // (no change to totalWins / totalLosses)

    guessInput.value = "";
    guessInput.focus();
});

/* ===== extra: pressing Enter triggers guess ===== */
guessInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        if (!guessBtn.disabled) {
            guessBtn.click();
        }
    }
});

// initialize attempts left on page load (already done, but also after reset)
// ensure global wins/losses start at zero but also update if any previous (none)
// they are zero by default. winsDisplay and lossesDisplay already set to 0.

</script>

</body>
</html>
