<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SkyCast · Weather Dashboard with Animated Sky</title>
  <style>
    /* ========== EXTERNAL CSS WITH 15+ RULES ========== */
    :root {
      --card-bg: rgba(255, 255, 255, 0.92);
      --primary-accent: #f39c12;
      --secondary-accent: #e67e22;
      --danger: #e74c3c;
      --success: #27ae60;
      --shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
      --text-dark: #1e2a36;
      --text-muted: #2c3e50;
      --cloud-speed: 25s;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Poppins', 'Roboto', sans-serif;
    }

    /* Animated Sky Background */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #0f2027 100%);
      position: relative;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
    }

    /* Animated Clouds Container */
    .clouds {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .cloud {
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 1000px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      animation: floatCloud linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
    }

    /* Cloud shapes */
    .cloud-1 {
      width: 120px;
      height: 70px;
      top: 15%;
      left: -150px;
      animation-duration: 35s;
    }
    .cloud-1::before {
      width: 50px;
      height: 50px;
      top: -25px;
      left: 20px;
    }
    .cloud-1::after {
      width: 70px;
      height: 70px;
      top: -35px;
      left: 55px;
    }

    .cloud-2 {
      width: 180px;
      height: 100px;
      top: 45%;
      left: -200px;
      animation-duration: 45s;
      animation-delay: -5s;
    }
    .cloud-2::before {
      width: 80px;
      height: 80px;
      top: -40px;
      left: 25px;
    }
    .cloud-2::after {
      width: 100px;
      height: 100px;
      top: -50px;
      left: 85px;
    }

    .cloud-3 {
      width: 150px;
      height: 85px;
      top: 70%;
      left: -180px;
      animation-duration: 40s;
      animation-delay: -12s;
    }
    .cloud-3::before {
      width: 65px;
      height: 65px;
      top: -32px;
      left: 20px;
    }
    .cloud-3::after {
      width: 85px;
      height: 85px;
      top: -42px;
      left: 70px;
    }

    .cloud-4 {
      width: 200px;
      height: 110px;
      top: 85%;
      left: -220px;
      animation-duration: 50s;
      animation-delay: -20s;
    }
    .cloud-4::before {
      width: 90px;
      height: 90px;
      top: -45px;
      left: 30px;
    }
    .cloud-4::after {
      width: 110px;
      height: 110px;
      top: -55px;
      left: 95px;
    }

    .cloud-5 {
      width: 100px;
      height: 60px;
      top: 25%;
      left: -120px;
      animation-duration: 30s;
      animation-delay: -8s;
    }
    .cloud-5::before {
      width: 45px;
      height: 45px;
      top: -22px;
      left: 15px;
    }
    .cloud-5::after {
      width: 60px;
      height: 60px;
      top: -30px;
      left: 45px;
    }

    @keyframes floatCloud {
      0% {
        transform: translateX(0) translateY(0);
      }
      50% {
        transform: translateX(calc(100vw + 200px)) translateY(-10px);
      }
      100% {
        transform: translateX(calc(100vw + 200px)) translateY(0);
      }
    }

    /* Main Container - Centered */
    .main-container {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .weather-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 2.5rem;
      padding: 2rem 2.2rem;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .weather-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f39c12, #d35400, #e67e22);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .sub {
      color: #2c3e50;
      border-left: 4px solid var(--primary-accent);
      padding-left: 0.75rem;
      margin-bottom: 1.8rem;
      font-weight: 500;
      font-size: 0.9rem;
      text-align: center;
      border-left: none;
      border-bottom: 2px solid var(--primary-accent);
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      padding-bottom: 5px;
    }

    .form-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      justify-content: center;
    }

    .input-wrapper {
      flex: 3;
      min-width: 200px;
    }

    input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border: 2px solid #e0e7ed;
      border-radius: 60px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
      outline: none;
      font-weight: 500;
    }

    input:focus {
      border-color: var(--primary-accent);
      box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.2);
      transform: scale(1.02);
    }

    button {
      background: linear-gradient(95deg, var(--primary-accent), var(--secondary-accent));
      border: none;
      padding: 0 2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.5px;
    }

    button:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #e67e22, #d35400);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    button:active {
      transform: scale(0.96);
    }

    .error-msg {
      background: rgba(254, 226, 226, 0.95);
      color: #b91c1c;
      padding: 0.7rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      margin: 0.5rem 0 1rem 0;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 5px solid var(--danger);
      font-weight: 500;
      backdrop-filter: blur(5px);
    }

    .weather-info {
      margin-top: 1.2rem;
      animation: fadeSlideUp 0.5s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .weather-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 2px dashed #dfe6e9;
      padding-bottom: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .city-name {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-dark);
    }

    .temp-big {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fef5e7, #ffe6cc);
      padding: 0.2rem 1rem;
      border-radius: 60px;
      color: #e67e22;
    }

    .weather-details {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: space-between;
      margin: 1rem 0;
    }

    .detail-card {
      background: rgba(248, 250, 252, 0.9);
      backdrop-filter: blur(5px);
      border-radius: 1.5rem;
      padding: 0.8rem 1.2rem;
      flex: 1;
      min-width: 110px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(236, 240, 241, 0.8);
      transition: transform 0.2s ease;
    }

    .detail-card:hover {
      transform: translateY(-3px);
    }

    .detail-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5d6e7e;
      font-weight: 600;
    }

    .detail-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: #2c3e50;
    }

    .weather-condition {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(5px);
      border-radius: 2rem;
      padding: 0.7rem 1.2rem;
      margin: 1rem 0;
      justify-content: center;
    }

    .condition-icon {
      font-size: 3rem;
    }

    .condition-text {
      font-size: 1.2rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .extra-row {
      display: flex;
      justify-content: space-between;
      background: rgba(236, 240, 241, 0.9);
      backdrop-filter: blur(5px);
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      margin-top: 1rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 10;
    }

    footer a {
      color: #f1c40f;
      text-decoration: none;
      font-weight: 600;
    }

    /* Responsive Design */
    @media (max-width: 650px) {
      .weather-card {
        padding: 1.5rem;
      }
      .city-name {
        font-size: 1.4rem;
      }
      .temp-big {
        font-size: 1.5rem;
      }
      .detail-value {
        font-size: 1.1rem;
      }
      h1 {
        font-size: 1.8rem;
      }
    }

    @media (max-width: 480px) {
      .weather-details {
        flex-direction: column;
      }
      .form-group {
        flex-direction: column;
      }
      button {
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <!-- Animated Clouds Background -->
  <div class="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="cloud cloud-4"></div>
    <div class="cloud cloud-5"></div>
  </div>

  <div class="main-container">
    <div class="weather-card">
      <h1>☁️ SkyCast 🌤️</h1>
      <div style="text-align: center;">
        <div class="sub">Real-time Weather · OpenWeatherMap API</div>
      </div>

      <!-- Form element for user input -->
      <div class="form-group">
        <div class="input-wrapper">
          <input type="text" id="cityInput" placeholder="Enter city name, e.g., London, Tokyo, Paris" autocomplete="off" aria-label="City for weather">
        </div>
        <button id="getWeatherBtn">🔍 Get Weather</button>
      </div>

      <!-- Container for error messages -->
      <div id="errorContainer"></div>

      <!-- Dynamic weather data display area -->
      <div id="weatherDisplay" class="weather-info"></div>
    </div>
    <footer>
      🌍 Powered by OpenWeatherMap API | Dynamic clouds & temperature-based visuals
    </footer>
  </div>

  <script>
    // ========== OPENWEATHERMAP API CONFIGURATION ==========
    // Active API key (replace with your own if needed)
    const API_KEY = '47f5cb3877364c059a4959f9f8622139';
    const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

    // DOM elements
    const cityInput = document.getElementById('cityInput');
    const getWeatherBtn = document.getElementById('getWeatherBtn');
    const errorContainer = document.getElementById('errorContainer');
    const weatherDisplay = document.getElementById('weatherDisplay');

    // Helper: clear previous error messages
    function clearErrors() {
      errorContainer.innerHTML = '';
    }

    // Helper: display custom error message
    function displayError(message) {
      errorContainer.innerHTML = `<div class="error-msg">⚠️ ${message}</div>`;
      weatherDisplay.innerHTML = '';
    }

    // Helper: show loading state
    function setLoading(isLoading) {
      if (isLoading) {
        getWeatherBtn.textContent = '⏳ Loading...';
        getWeatherBtn.disabled = true;
      } else {
        getWeatherBtn.textContent = '🔍 Get Weather';
        getWeatherBtn.disabled = false;
      }
    }

    // JS VALIDATION for form element (city input)
    function validateCityInput(city) {
      if (!city || city.trim() === '') {
        return { valid: false, message: '❌ City name cannot be empty. Please enter a valid city.' };
      }
      const trimmed = city.trim();
      if (trimmed.length < 2) {
        return { valid: false, message: '❌ City name must be at least 2 characters long.' };
      }
      if (trimmed.length > 50) {
        return { valid: false, message: '❌ City name is too long (max 50 characters).' };
      }
      const cityRegex = /^[a-zA-Z\s\-'\.]+$/;
      if (!cityRegex.test(trimmed)) {
        return { valid: false, message: '❌ Please use only letters, spaces, hyphens, or apostrophes for city name.' };
      }
      return { valid: true, message: '', trimmedCity: trimmed };
    }

    // Fetch weather data from OpenWeatherMap API
    async function fetchWeather(city) {
      try {
        const url = `${BASE_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric&lang=en`;
        const response = await fetch(url);
        
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error(`City "${city}" not found. Please check spelling or try another city.`);
          } else if (response.status === 401) {
            throw new Error('Invalid API key. Please check your OpenWeatherMap API key.');
          } else {
            throw new Error(`API error (${response.status}). Please try again later.`);
          }
        }
        
        const data = await response.json();
        return data;
      } catch (err) {
        throw new Error(err.message || 'Network error: Failed to fetch weather data.');
      }
    }

    // Get temperature-based icon
    function getTemperatureBasedIcon(tempCelsius, weatherMain) {
      if (tempCelsius >= 35) return '🔥🌡️🥵';
      if (tempCelsius >= 30) return '🔥🌞';
      if (tempCelsius >= 20) return '☀️🌸';
      if (tempCelsius >= 10) return '🌤️🍂';
      if (tempCelsius >= 0) return '❄️🧥';
      return '⛄️🥶❄️';
    }
    
    function getWeatherConditionIcon(weatherId, temp) {
      if (weatherId >= 200 && weatherId < 300) return '⛈️⚡🌩️';
      if (weatherId >= 300 && weatherId < 400) return '🌧️💧☔';
      if (weatherId >= 500 && weatherId < 600) return '🌧️☔🌈';
      if (weatherId >= 600 && weatherId < 700) return '❄️☃️⛄';
      if (weatherId >= 700 && weatherId < 800) return '🌫️😶‍🌫️';
      if (weatherId === 800) return temp >= 25 ? '☀️😎✨' : '✨☀️🌟';
      if (weatherId > 800) return '☁️🌥️⛅';
      return '🌡️📊';
    }

    function renderWeatherData(data) {
      const cityName = data.name;
      const country = data.sys?.country ? `, ${data.sys.country}` : '';
      const temp = data.main.temp;
      const feelsLike = data.main.feels_like;
      const humidity = data.main.humidity;
      const pressure = data.main.pressure;
      const weatherDesc = data.weather[0]?.description || 'unknown';
      const weatherId = data.weather[0]?.id || 800;
      const windSpeed = data.wind.speed;
      
      const tempIconSet = getTemperatureBasedIcon(temp, weatherDesc);
      const conditionIcon = getWeatherConditionIcon(weatherId, temp);
      const mainIcon = conditionIcon + ' ' + tempIconSet;
      
      const tempRounded = Math.round(temp);
      const feelsRounded = Math.round(feelsLike);
      
      let tempMessage = '';
      if (tempRounded >= 35) tempMessage = '🔥 Extreme heat! Stay hydrated!';
      else if (tempRounded >= 30) tempMessage = '🔥 Hot & Sunny — perfect beach weather!';
      else if (tempRounded >= 20) tempMessage = '🌸 Warm breeze — ideal for outdoor activities';
      else if (tempRounded >= 10) tempMessage = '🍂 Mild & comfortable — grab a light jacket';
      else if (tempRounded >= 0) tempMessage = '🧥 Chilly — don\'t forget your coat!';
      else tempMessage = '⛄ Freezing! Bundle up warmly!';
      
      const weatherHtml = `
        <div class="weather-header">
          <span class="city-name">${escapeHtml(cityName)}${escapeHtml(country)}</span>
          <span class="temp-big">${tempRounded}°C</span>
        </div>
        <div class="weather-condition">
          <span class="condition-icon">${mainIcon}</span>
          <span class="condition-text">${escapeHtml(weatherDesc)} • Feels like ${feelsRounded}°C</span>
        </div>
        <div class="weather-details">
          <div class="detail-card">
            <div class="detail-label">💧 HUMIDITY</div>
            <div class="detail-value">${humidity}%</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">🌬️ WIND</div>
            <div class="detail-value">${windSpeed} m/s</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">🔽 PRESSURE</div>
            <div class="detail-value">${pressure} hPa</div>
          </div>
        </div>
        <div class="extra-row">
          <span>📊 ${tempMessage}</span>
        </div>
      `;
      
      weatherDisplay.innerHTML = weatherHtml;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Main controller
    async function handleWeatherRequest() {
      clearErrors();
      weatherDisplay.innerHTML = '';
      
      const rawCity = cityInput.value;
      const validation = validateCityInput(rawCity);
      if (!validation.valid) {
        displayError(validation.message);
        return;
      }
      
      const validCity = validation.trimmedCity;
      setLoading(true);
      
      try {
        const weatherData = await fetchWeather(validCity);
        renderWeatherData(weatherData);
      } catch (err) {
        displayError(err.message || 'Unexpected error while fetching weather.');
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    // Event listeners
    getWeatherBtn.addEventListener('click', handleWeatherRequest);
    cityInput.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleWeatherRequest();
      }
    });
    
    // Welcome message
    window.addEventListener('DOMContentLoaded', () => {
      errorContainer.innerHTML = `<div class="error-msg" style="background: rgba(232, 240, 254, 0.95); color: #0b5e7e; border-left-color: #3498db;">🌐 Welcome to SkyCast! Enter a city name (e.g., Paris, Tokyo, New York) and click "Get Weather" to see real-time conditions.</div>`;
      setTimeout(() => {
        if (errorContainer.innerHTML.includes('Welcome to SkyCast')) {
          errorContainer.innerHTML = '';
        }
      }, 5000);
    });
  </script>
</body>
</html>
