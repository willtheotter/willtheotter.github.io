<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h2 class="mb-4 text-center">Sign Up</h2>

    <!-- ZIP -->
    <div class="mb-3">
      <label>Zip Code</label>
      <input type="text" id="zip" class="form-control">
      <small id="zipError" class="text-danger"></small>
    </div>

    <!-- CITY -->
    <div class="mb-3">
      <label>City</label>
      <input type="text" id="city" class="form-control" readonly>
    </div>

    <!-- LAT/LONG -->
    <div class="mb-3">
      <label>Latitude</label>
      <input type="text" id="lat" class="form-control" readonly>
    </div>

    <div class="mb-3">
      <label>Longitude</label>
      <input type="text" id="lon" class="form-control" readonly>
    </div>

    <!-- STATE -->
    <div class="mb-3">
      <label>State</label>
      <select id="state" class="form-select"></select>
    </div>

    <!-- COUNTY -->
    <div class="mb-3">
      <label>County</label>
      <select id="county" class="form-select"></select>
    </div>

    <!-- USERNAME -->
    <div class="mb-3">
      <label>Username</label>
      <input type="text" id="username" class="form-control">
      <small id="userMsg"></small>
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
      <label>Password</label>
      <input type="password" id="password" class="form-control">
      <small id="suggested"></small>
    </div>

    <!-- RETYPE -->
    <div class="mb-3">
      <label>Retype Password</label>
      <input type="password" id="retype" class="form-control">
    </div>

    <button class="btn btn-primary w-100" onclick="validateForm()">Submit</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
